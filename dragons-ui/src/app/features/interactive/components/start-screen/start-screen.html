<section class="border-2 border-black p-4 max-w-xl mx-auto">
  <h2 class="text-lg font-bold mb-3">{{ 'start.title' | transloco }}</h2>
  <p class="mb-2">{{ 'start.chooseStrategy' | transloco }}</p>
  <div class="flex flex-wrap gap-2 mb-4">
    @for (strategy of strategies(); track strategy) {
      <button type="button" class="border-2 px-3 py-1"
              [class.border-green-600]="isSelected(strategy)"
              [class.border-black]="!isSelected(strategy)"
              (click)="choose(strategy)">
        {{ strategy }}
      </button>
    }
    <button type="button" class="border-2 px-3 py-1"
            [class.border-green-600]="isSelected(null)"
            [class.border-black]="!isSelected(null)"
            (click)="choose(null)">
      {{ 'start.none' | transloco }}
    </button>
  </div>
  <button type="button" class="border-2 border-black px-4 py-2 font-semibold" (click)="emitStart()">
    {{ 'start.startGame' | transloco }}
  </button>
</section>

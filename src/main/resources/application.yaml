spring:
  application:
    name: dragons

mugloar:
  base-url: https://dragonsofmugloar.com
  connection-timeout: 10
  read-timeout: 30
  max-attempts: 4
  initial-backoff-ms: 500

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

game:
  target-score: 1000
  max-turns: 1000
  thread-pool-size: 3
  batch-size: 50
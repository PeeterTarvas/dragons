spring:
  application:
    name: dragons

mugloar:
  base-url: https://dragonsofmugloar.com
  connection-timeout: 10
  read-timeout: 30
  max-attempts: 4
  initial-backoff-ms: 500
  multiplier: 2
  retry-jitter-ms: 200


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

game:
  target-score: 1000
  max-turns: 1000
  thread-pool-size: 3
  batch-size: 50
  strategy: expected-value    # expected-value or low-risk
  probability-floor: 0.2
  low-lives-threshold: 2
  healing-potion-max-cost: 50
  session-ttl-minutes: 1
  session-eviction-rate-ms: 600000
  extra-lives-buffer: 1
